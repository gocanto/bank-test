name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Check formatting
        run: |
          gofmt -w $(find . -name '*.go' -not -path './.git/*')
          git diff --exit-code

      - name: Build Docker toolbox
        run: docker compose build tools

      - name: Run checks
        run: make check
