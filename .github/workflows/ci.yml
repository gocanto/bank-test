name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Go version from go-fmt
        id: go-version
        run: echo "version=$(./infra/scripts/go-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          cache: true

      - name: Check formatting
        run: make lint

      - name: Build Docker toolbox
        run: make build-tools

      - name: Run checks
        run: make check
