name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Go version from go-fmt
        id: go-version
        run: echo "version=$(./infra/scripts/go-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check formatting
        run: make lint

      - name: Build Docker toolbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/toolbox.Dockerfile
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
          cache-from: type=gha,scope=toolbox
          cache-to: type=gha,mode=max,scope=toolbox

      - name: Run tests
        run: make test

      - name: Run vet
        run: make vet
