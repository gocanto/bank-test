name: go ci

on:
  workflow_call:
    inputs:
      suite:
        description: Verification suite to run.
        required: true
        type: string
      build-toolbox:
        description: Build and cache the Dockerized toolbox.
        default: false
        required: false
        type: boolean
      toolbox-cache-scope:
        description: Shared GitHub Actions cache scope for the Dockerized toolbox.
        default: toolbox
        required: false
        type: string

jobs:
  verify:
    name: ${{ inputs.suite }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate suite
        run: |
          case "${{ inputs.suite }}" in
            tests|e2e) ;;
            *) echo "Unsupported suite: ${{ inputs.suite }}" >&2; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Go version from go-fmt
        id: go-version
        run: echo "version=$(./infra/scripts/go-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          cache: true
          cache-dependency-path: go.sum

      - name: Check Docker
        run: docker version

      - name: Set up Docker Buildx
        if: ${{ inputs.build-toolbox }}
        uses: docker/setup-buildx-action@v3

      - name: Check formatting
        if: ${{ inputs.suite == 'tests' }}
        run: make lint

      - name: Build Docker toolbox
        if: ${{ inputs.build-toolbox }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/toolbox.Dockerfile
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
          cache-from: type=gha,scope=${{ inputs.toolbox-cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.toolbox-cache-scope }}

      - name: Run tests
        if: ${{ inputs.suite == 'tests' }}
        run: make test

      - name: Run vet
        if: ${{ inputs.suite == 'tests' }}
        run: make vet

      - name: Run e2e tests
        if: ${{ inputs.suite == 'e2e' }}
        run: make test-e2e
